name: Android APK Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

concurrency:
  group: android-apk-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    env:
      CAP_APP_ENV: production
      NEXT_PUBLIC_PRODUCTION_APP_URL: ${{ secrets.NEXT_PUBLIC_PRODUCTION_APP_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure production Capacitor shell
        run: |
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from "node:fs/promises";

          const marker = "__FITPULSE_APP_URL__";
          const appUrl = process.env.NEXT_PUBLIC_PRODUCTION_APP_URL?.replace(/\/+$/, "");
          if (!appUrl || !appUrl.startsWith("https://")) {
            throw new Error("NEXT_PUBLIC_PRODUCTION_APP_URL must be an HTTPS URL.");
          }

          const shellPath = "capacitor-shell/index.html";
          const shell = await readFile(shellPath, "utf8");
          const configuredShell = shell.includes(marker)
            ? shell.replaceAll(marker, appUrl)
            : shell.replace(/var APP_HOST = "https:\/\/[^\"]+";/, `var APP_HOST = "${appUrl}";`);

          if (configuredShell === shell) {
            throw new Error("Capacitor shell APP_HOST setting was not found.");
          }

          await writeFile(shellPath, configuredShell, "utf8");
          EOF

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Build debug APK
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Prepare APK
        id: apk
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="android-apk-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          apk_name="FitPulse-${short_sha}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$apk_name"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Remove previous APK releases and artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName' |
          while read -r tag; do
            if [[ "$tag" == android-apk-* ]]; then
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
            fi
          done

          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts" --paginate \
            --jq '.artifacts[] | select(.name | startswith("FitPulse-")) | .id' |
          while read -r artifact_id; do
            if [[ -n "$artifact_id" ]]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id"
            fi
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 7

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.tag }}
          name: FitPulse Android APK ${{ github.run_number }}
          body: |
            Latest FitPulse apk.
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: ${{ steps.apk.outputs.apk_name }}
