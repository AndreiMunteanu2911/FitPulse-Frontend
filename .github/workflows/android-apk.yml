name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Capacitor APK
    runs-on: ubuntu-latest

    env:
      CAP_APP_ENV: ${{ secrets.CAP_APP_ENV || vars.CAP_APP_ENV || 'production' }}
      NEXT_PUBLIC_APP_ENV: ${{ secrets.NEXT_PUBLIC_APP_ENV || vars.NEXT_PUBLIC_APP_ENV || 'production' }}
      NEXT_PUBLIC_PRODUCTION_APP_URL: ${{ secrets.NEXT_PUBLIC_PRODUCTION_APP_URL || vars.NEXT_PUBLIC_PRODUCTION_APP_URL || 'https://fitpulseam.vercel.app' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Verify Java runtime
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          chmod +x android/gradlew
          cd android
          ./gradlew --version
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/FitPulse.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitPulse.apk
          path: android/app/build/outputs/apk/debug/FitPulse.apk

      - name: Move latest Android release tag
        if: github.ref == 'refs/heads/master'
        run: |
          git tag -f android-latest "$GITHUB_SHA"
          git push -f origin android-latest

      - name: Publish APK to latest GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Latest Android APK
          body: Latest debug APK built from master.
          make_latest: true
          overwrite_files: true
          files: android/app/build/outputs/apk/debug/FitPulse.apk

      - name: Publish APK to versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: android/app/build/outputs/apk/debug/FitPulse.apk
