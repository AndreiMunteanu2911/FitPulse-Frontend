name: Android APK Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: android-apk-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    env:
      CAP_APP_ENV: ${{ secrets.CAP_APP_ENV || vars.CAP_APP_ENV || 'production' }}
      NEXT_PUBLIC_APP_ENV: ${{ secrets.NEXT_PUBLIC_APP_ENV || vars.NEXT_PUBLIC_APP_ENV || 'production' }}
      NEXT_PUBLIC_PRODUCTION_APP_URL: ${{ secrets.NEXT_PUBLIC_PRODUCTION_APP_URL || vars.NEXT_PUBLIC_PRODUCTION_APP_URL || 'https://fitpulseam.vercel.app' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Build debug APK
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Prepare APK
        id: apk
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="android-apk-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          apk_name="FitPulse-${short_sha}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$apk_name"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_name }}

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.tag }}
          name: FitPulse Android APK ${{ github.run_number }}
          body: |
            Automated debug APK built from `${{ github.sha }}` on `main`.
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: ${{ steps.apk.outputs.apk_name }}
